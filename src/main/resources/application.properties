spring.application.name=polaris

server.servlet.context-path=/api/v1/

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.db.populate.enabled=${APP_DB_POPULATE_ENABLED:false}
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:604800}
app.bootstrap.admin.username=${BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.vault.password=${VAULT_PASSWORD:}

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:polaris}?currentSchema=${DB_SCHEMA}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
