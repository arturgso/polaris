name: Deploy Staging

on:
  workflow_run:
    workflows: ["Docker Image CI"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gha-polaris-staging

      - name: Verify Tailscale connectivity
        run: |
          set -euo pipefail
          tailscale status
          tailscale ping --timeout=10s integrity

      - name: Deploy backend service to staging
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: integrity
          username: ${{ secrets.INTEGRITY_USER }}
          password: ${{ secrets.INTEGRITY_PASSWORD }}
          script_stop: true
          timeout: 120s
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd "/home/${{ secrets.INTEGRITY_USER }}/apps/polaris-dev"
            docker compose pull polaris-api-dev
            docker compose up -d --force-recreate --no-deps polaris-api-dev
